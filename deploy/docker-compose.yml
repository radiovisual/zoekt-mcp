# Zoekt backend for zoekt-mcp.
#
# Two services share a named volume holding the zoekt index files:
#
#   1. zoekt-indexer — one-shot. Mounts the directory pointed to by
#      the ZOEKT_REPOS_DIR env var (default: ./repos, a gitignored
#      scratch dir under deploy/) read-only at /src, loops over every
#      top-level subdirectory, turns each one into a throwaway git
#      repo, and runs `zoekt-git-index` so the shards land in the
#      shared index volume.
#
#      We go through a throwaway git repo because the published
#      `sourcegraph/zoekt-indexserver` image ships only zoekt-git-index
#      (not the generic zoekt-index binary), so any directory we want
#      to index has to look like a git repo first.
#
#   2. zoekt-webserver — long-running. Serves the HTTP JSON API on
#      port 6070, reading from the same index volume. Waits for the
#      indexer to finish successfully before starting.
#
# Typical use:
#
#   # 1. drop code to search into deploy/repos/ (git clones, symlinks,
#   #    or plain directories — each top-level subdir becomes one
#   #    searchable "repo" in zoekt)
#   mkdir -p deploy/repos
#   git clone https://github.com/myorg/myrepo deploy/repos/myrepo
#
#   # 2. bring the stack up
#   docker compose -f deploy/docker-compose.yml up -d
#
#   # 3. to rebuild the index after editing source under deploy/repos/:
#   ./deploy/index.sh
#
# To point the backend at a different directory (e.g. the test
# corpus under examples/), set ZOEKT_REPOS_DIR before invoking
# compose. See tests/fixtures/up.sh for the integration-test wiring.

name: zoekt-mcp-backend

services:
  zoekt-indexer:
    # Upstream Sourcegraph image. Ships universal-ctags 6.1.0 at
    # /usr/local/bin/universal-ctags — zoekt-git-index invokes it
    # automatically to extract symbol definitions (functions, classes,
    # constants). Without ctags, `sym:` queries return nothing and
    # result ranking degrades, so if you ever swap this image for a
    # slimmer one, make sure the replacement still provides
    # `universal-ctags` on $PATH. The integration tests under
    # tests/test_integration.py assert this end-to-end via `sym:`
    # queries and the per-repo `HasSymbols` flag.
    image: sourcegraph/zoekt-indexserver:latest
    container_name: zoekt-mcp-indexer
    restart: "no"
    # NOTE: docker compose interpolates $VAR / ${VAR} in YAML strings
    # before the container ever sees them. To pass literal dollar signs
    # through to the shell script below, every $ is doubled as $$.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        git config --global user.email "zoekt-indexer@example.com"
        git config --global user.name "zoekt indexer"

        # Full rebuild, not incremental: wipe any pre-existing shards so
        # stale repos from previous runs (e.g. the in-repo test fixtures,
        # or a directory the user removed from $ZOEKT_REPOS_DIR) don't
        # leak into search results. The index volume is shared across
        # runs, and zoekt-git-index only overwrites shards for repos it
        # sees this time around — anything it doesn't see would otherwise
        # persist forever.
        rm -rf /data/* /data/.[!.]* /data/..?* 2>/dev/null || true

        indexed=0
        for src in /src/*; do
          [ -d "$${src}" ] || continue
          repo="$$(basename "$${src}")"
          work="/tmp/$${repo}"
          rm -rf "$${work}"
          cp -r "$${src}" "$${work}"
          cd "$${work}"
          # Wipe any pre-existing .git so a user-dropped `git clone`
          # doesn't collide with our throwaway snapshot repo. We only
          # need file contents; zoekt-git-index will build its own
          # history from the single snapshot commit we create below.
          rm -rf .git
          git init -q -b main
          git add -A
          if ! git -c commit.gpgsign=false commit -q -m "snapshot" 2>/dev/null; then
            echo "Skipping $${repo}: nothing to commit"
            continue
          fi
          git config zoekt.name "$${repo}"
          echo "Indexing $${repo}..."
          zoekt-git-index -branches main -index /data "$${work}"
          indexed=$$((indexed + 1))
        done

        if [ "$${indexed}" -eq 0 ]; then
          echo "WARNING: no repositories were indexed." >&2
          echo "Populate \$$ZOEKT_REPOS_DIR (default ./repos) with at least one directory." >&2
          exit 1
        fi

        echo "Done. Indexed $${indexed} repo(s). Shards in /data:"
        ls -la /data
    volumes:
      - ${ZOEKT_REPOS_DIR:-./repos}:/src:ro
      - zoekt-index:/data

  zoekt-webserver:
    image: sourcegraph/zoekt-webserver:latest
    container_name: zoekt-mcp-webserver
    restart: unless-stopped
    # The image's entrypoint is `tini --`, so the command has to start
    # with the binary name for tini to exec it. `-rpc` registers the
    # JSON API under /api/* — without it, requests to /api/search fall
    # through to the HTML search handler and the client gets HTML back
    # instead of JSON.
    command:
      - "zoekt-webserver"
      - "-index"
      - "/data"
      - "-listen"
      - ":6070"
      - "-rpc"
    ports:
      - "6070:6070"
    volumes:
      - zoekt-index:/data:ro
    depends_on:
      zoekt-indexer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6070/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  zoekt-index:
    name: zoekt-mcp-index
