# Zoekt backend for zoekt-mcp.
#
# Two services share a named volume holding the zoekt index files:
#
#   1. zoekt-indexer — one-shot. Runs `zoekt-index` across every
#      directory under examples/ (mounted read-only at /src) and writes
#      the resulting index shards to /data.
#
#   2. zoekt-webserver — long-running. Serves the HTTP JSON API on
#      port 6070, reading from the same index volume. Waits for the
#      indexer to finish successfully before starting.
#
# Run from the repo root:
#
#   docker compose -f deploy/docker-compose.yml up -d
#
# To rebuild the index after editing examples/, rerun just the
# indexer:
#
#   ./deploy/index.sh
#
# Both images are the combined builds published by Sourcegraph on
# Docker Hub; all zoekt binaries (zoekt-index, zoekt-git-index,
# zoekt-webserver, ...) are available under /usr/local/bin in each.

name: zoekt-mcp-backend

services:
  zoekt-indexer:
    image: sourcegraph/zoekt-indexserver:latest
    container_name: zoekt-mcp-indexer
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "Indexing examples/flask-app..."
        zoekt-index -index /data /src/flask-app
        echo "Indexing examples/express-app..."
        zoekt-index -index /data /src/express-app
        echo "Done. Indexed shards:"
        ls -la /data
    volumes:
      - ../examples:/src:ro
      - zoekt-index:/data

  zoekt-webserver:
    image: sourcegraph/zoekt-webserver:latest
    container_name: zoekt-mcp-webserver
    restart: unless-stopped
    command:
      - "-index"
      - "/data"
      - "-listen"
      - ":6070"
    ports:
      - "6070:6070"
    volumes:
      - zoekt-index:/data:ro
    depends_on:
      zoekt-indexer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6070/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  zoekt-index:
    name: zoekt-mcp-index
