# Auto-generated release notes configuration.
#
# GitHub reads this file when the Release workflow calls
# `generate_release_notes: true` and groups merged PRs into the
# categories below based on their labels. Unlabelled PRs fall into
# "Other changes". Refine categories or labels over time as needed.
#
# Docs: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
  categories:
    - title: Breaking changes
      labels:
        - breaking
        - breaking-change
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Docs
      labels:
        - docs
        - documentation
    - title: Build, CI, and tooling
      labels:
        - build
        - ci
        - chore
    - title: Other changes
      labels:
        - "*"
